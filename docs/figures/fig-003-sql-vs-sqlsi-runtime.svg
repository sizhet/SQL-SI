<svg width="1200" height="650" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#020617"/>

    <text x="600" y="55" text-anchor="middle" font-size="34" fill="#e5e7eb" font-family="Arial" font-weight="bold">
        Fig-003 — SQL vs SQL-SI Comparative Runtime
    </text>

    <text x="300" y="125" text-anchor="middle" font-size="28" fill="#f87171" font-family="Arial" font-weight="bold">
        Traditional SQL
    </text>

    <text x="900" y="125" text-anchor="middle" font-size="28" fill="#60a5fa" font-family="Arial" font-weight="bold">
        SQL-SI
    </text>

    <g font-family="Arial" font-size="20" font-weight="bold">
        <rect x="130" y="170" width="340" height="70" rx="16" fill="#7f1d1d"/>
        <text x="300" y="215" text-anchor="middle" fill="white">Rows / Tables</text>

        <rect x="130" y="290" width="340" height="70" rx="16" fill="#991b1b"/>
        <text x="300" y="335" text-anchor="middle" fill="white">JOIN / GROUP / WINDOW</text>

        <rect x="130" y="410" width="340" height="70" rx="16" fill="#b91c1c"/>
        <text x="300" y="455" text-anchor="middle" fill="white">Recompute Pattern</text>

        <rect x="730" y="170" width="340" height="70" rx="16" fill="#1d4ed8"/>
        <text x="900" y="215" text-anchor="middle" fill="white">Rows / Tables</text>

        <rect x="730" y="290" width="340" height="70" rx="16" fill="#0369a1"/>
        <text x="900" y="335" text-anchor="middle" fill="white">Extract Structural Objects</text>

        <rect x="730" y="410" width="340" height="70" rx="16" fill="#0f766e"/>
        <text x="900" y="455" text-anchor="middle" fill="white">Store CCC / Trajectory</text>

        <rect x="730" y="530" width="340" height="70" rx="16" fill="#7c3aed"/>
        <text x="900" y="575" text-anchor="middle" fill="white">Reuse by Metric / Policy</text>
    </g>

    <g stroke="#e5e7eb" stroke-width="4" marker-end="url(#arrow)">
        <line x1="300" y1="240" x2="300" y2="290"/>
        <line x1="300" y1="360" x2="300" y2="410"/>
        <line x1="900" y1="240" x2="900" y2="290"/>
        <line x1="900" y1="360" x2="900" y2="410"/>
        <line x1="900" y1="480" x2="900" y2="530"/>
    </g>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L7,3 z" fill="#e5e7eb"/>
        </marker>
    </defs>
</svg>
<svg width="1200" height="560" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#111827"/>

    <text x="600" y="50" text-anchor="middle" font-size="34" fill="#f9fafb" font-family="Arial" font-weight="bold">
        Fig-002 — SQL to SQL-SI Flow
    </text>

    <g font-family="Arial" font-size="20" font-weight="bold">
        <rect x="60" y="180" width="150" height="80" rx="16" fill="#ca8a04"/>
        <text x="135" y="230" text-anchor="middle" fill="white">Rows</text>

        <rect x="260" y="180" width="170" height="80" rx="16" fill="#16a34a"/>
        <text x="345" y="230" text-anchor="middle" fill="white">Trajectory</text>

        <rect x="480" y="180" width="150" height="80" rx="16" fill="#0891b2"/>
        <text x="555" y="230" text-anchor="middle" fill="white">CCC</text>

        <rect x="680" y="180" width="190" height="80" rx="16" fill="#2563eb"/>
        <text x="775" y="230" text-anchor="middle" fill="white">MetricPoint</text>

        <rect x="920" y="180" width="220" height="80" rx="16" fill="#7c3aed"/>
        <text x="1030" y="230" text-anchor="middle" fill="white">Reuse / PDS</text>
    </g>

    <g stroke="#f9fafb" stroke-width="4" marker-end="url(#arrow)">
        <line x1="210" y1="220" x2="260" y2="220"/>
        <line x1="430" y1="220" x2="480" y2="220"/>
        <line x1="630" y1="220" x2="680" y2="220"/>
        <line x1="870" y1="220" x2="920" y2="220"/>
    </g>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L7,3 z" fill="#f9fafb"/>
        </marker>
    </defs>

    <text x="600" y="360" text-anchor="middle" font-size="23" fill="#e5e7eb" font-family="Arial">
        Traditional SQL recomputes structure per query.
    </text>
    <text x="600" y="400" text-anchor="middle" font-size="23" fill="#e5e7eb" font-family="Arial">
        SQL-SI extracts, stores, compares, and reuses structural objects.
    </text>
</svg>